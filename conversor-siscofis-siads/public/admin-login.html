<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Conversor SISCOFIS-SIADS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand .shield { font-size: 40px; margin-bottom: 8px; }
        .brand h1 { font-size: 20px; color: #2c3e50; margin-bottom: 4px; }
        .brand p  { font-size: 12px; color: #888; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
        .field input {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid #ddd; border-radius: 8px;
            font-size: 15px; transition: border-color 0.2s;
        }
        .field input:focus { outline: none; border-color: #2c3e50; }
        .btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
            color: white; border: none; border-radius: 25px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 8px; transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(44,62,80,0.4); }
        .msg {
            margin-top: 14px; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; display: none;
        }
        .msg.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .restricted { text-align: center; margin-top: 16px; font-size: 11px; color: #bbb; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="shield">🛡️</div>
            <h1>Painel Administrativo</h1>
            <p>Conversor SISCOFIS-SIADS — Acesso restrito</p>
        </div>

        <form id="loginForm">
            <div class="field">
                <label>CPF do Administrador</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" autocomplete="off" required>
            </div>
            <div class="field">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>

        <div id="msg" class="msg"></div>
        <p class="restricted">🔒 Área restrita — somente administrador</p>
    </div>

    <script>
        // Formata CPF ao digitar
        document.getElementById('cpf').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '').slice(0, 11);
            if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/, '$1.$2');
            e.target.value = v;
        });

        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.className = 'msg';
            msg.textContent = '';

            const cpf      = document.getElementById('cpf').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpf, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    msg.className = 'msg error';
                    msg.textContent = data.message || 'Erro ao autenticar';
                }
            } catch {
                msg.className = 'msg error';
                msg.textContent = 'Erro de conexão com o servidor';
            }
        });
    </script>
</body>
</html>
