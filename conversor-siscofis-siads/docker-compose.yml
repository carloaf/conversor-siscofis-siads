services:
  pdf-extractor:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: conversor-siscofis-siads
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./output:/usr/src/app/output
      - ./data:/usr/src/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped